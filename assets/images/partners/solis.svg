<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 100" width="220" height="100">
  <rect width="220" height="100" fill="white" rx="0"/>
  <!-- Solis sun icon (starburst) -->
  <g transform="translate(62,50)">
    <circle cx="0" cy="0" r="12" fill="none" stroke="#d97a26" stroke-width="3"/>
    <!-- rays -->
    <line x1="0" y1="-20" x2="0" y2="-15" stroke="#d97a26" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="15" x2="0" y2="20" stroke="#d97a26" stroke-width="3" stroke-linecap="round"/>
    <line x1="-20" y1="0" x2="-15" y2="0" stroke="#d97a26" stroke-width="3" stroke-linecap="round"/>
    <line x1="15" y1="0" x2="20" y2="0" stroke="#d97a26" stroke-width="3" stroke-linecap="round"/>
    <line x1="-14" y1="-14" x2="-10" y2="-10" stroke="#d97a26" stroke-width="3" stroke-linecap="round"/>
    <line x1="10" y1="10" x2="14" y2="14" stroke="#d97a26" stroke-width="3" stroke-linecap="round"/>
    <line x1="14" y1="-14" x2="10" y2="-10" stroke="#d97a26" stroke-width="3" stroke-linecap="round"/>
    <line x1="-10" y1="10" x2="-14" y2="14" stroke="#d97a26" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- solis text -->
  <text x="140" y="57" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="400" text-anchor="middle" fill="#d97a26">solis</text>
</svg>
