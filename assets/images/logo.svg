<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 420" width="100%" height="100%">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#001F42" />
      <stop offset="100%" stop-color="#003b80" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#007d32" />
      <stop offset="100%" stop-color="#00b84c" />
    </linearGradient>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff7b00" />
      <stop offset="100%" stop-color="#ffbb00" />
    </linearGradient>
    
    <style>
      .logo-s { fill: url(#blueGrad); }
      .logo-e { fill: url(#greenGrad); }
      .logo-leaf { fill: url(#greenGrad); }
      .logo-leaf-vein { stroke: #ffffff; stroke-width: 1.5; fill: none; stroke-linecap: round; opacity: 0.6; }
      .logo-sun { fill: url(#sunGrad); }
      .logo-text-navy { fill: #002D62; font-family: 'Outfit', 'Inter', sans-serif; font-weight: 800; }
      .logo-text-green { fill: #009a44; font-family: 'Outfit', 'Inter', sans-serif; font-weight: 600; letter-spacing: 6px; }
      .logo-text-navy-sm { fill: #002D62; font-family: 'Outfit', 'Inter', sans-serif; font-weight: 600; letter-spacing: 4px; }
      .logo-tagline { fill: #002D62; font-family: 'Outfit', 'Inter', sans-serif; font-weight: 600; letter-spacing: 1.5px; font-size: 8.5px; opacity: 0.95; }
      .logo-line { stroke: #009a44; stroke-width: 1.5; }
      
      /* Micro-animations if inline */
      .animate-sun {
        transform-origin: 295px 85px;
        animation: rotateSun 25s infinite linear;
      }
      .animate-leaf {
        transform-origin: 210px 185px;
        animation: swayLeaf 4s infinite ease-in-out;
      }
      @keyframes rotateSun {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes swayLeaf {
        0%, 100% { transform: rotate(0deg); }
        50% { transform: rotate(5deg); }
      }
    </style>
  </defs>

  <!-- ================= MONOGRAM (S, E, Leaf, Sun) ================= -->
  <g id="monogram" transform="translate(10, 0)">
    
    <!-- Sun (Above the E) -->
    <g class="animate-sun">
      <!-- Sun Arc -->
      <path class="logo-sun" d="M 280 92 A 25 25 0 0 1 315 70 A 25 25 0 0 1 328 85 L 322 87 A 19 19 0 0 0 311 75 A 19 19 0 0 0 285 91 Z" />
      <!-- Sun Rays -->
      <polygon class="logo-sun" points="274,75 277,63 283,73" />
      <polygon class="logo-sun" points="290,58 296,45 300,56" />
      <polygon class="logo-sun" points="310,49 320,38 321,50" />
      <polygon class="logo-sun" points="330,52 342,44 338,56" />
      <polygon class="logo-sun" points="345,64 360,60 351,70" />
      <polygon class="logo-sun" points="353,81 370,82 357,87" />
    </g>

    <!-- Stylized "S" (Navy Blue) -->
    <path class="logo-s" d="M 248 70 
             C 215 50, 185 65, 182 85 
             C 178 110, 248 108, 252 135 
             C 255 160, 215 185, 180 165
             C 170 160, 168 152, 172 148
             C 176 144, 182 147, 187 151
             C 212 169, 235 152, 232 136
             C 228 112, 160 115, 164 84
             C 168 53, 215 35, 252 56
             C 258 60, 256 66, 248 70 Z" />

    <!-- Stylized "E" (Vibrant Green) -->
    <!-- It overlaps the middle of the S and extends to the right -->
    <path class="logo-e" d="M 215 102 
             L 295 102 
             C 298 102, 298 108, 295 108 
             L 230 108 
             L 225 125 
             L 282 125 
             C 285 125, 285 131, 282 131 
             L 222 131 
             L 218 150 
             L 298 150 
             C 300 152, 295 158, 285 158 
             L 205 158 
             C 202 158, 195 153, 198 145 
             L 208 108 
             C 210 102, 212 102, 215 102 Z" />

    <!-- Leaf (Green leaf wrapping bottom tail of S) -->
    <g class="animate-leaf">
      <!-- Leaf Body -->
      <path class="logo-leaf" d="M 172 148 C 158 135, 160 115, 164 110 C 172 125, 186 138, 190 144 C 192 147, 184 154, 172 148 Z" />
      <!-- Leaf Vein -->
      <path class="logo-leaf-vein" d="M 164 110 Q 170 128 178 145" />
    </g>
    
  </g>

  <!-- ================= LOGO TEXT & TYPOGRAPHY ================= -->
  
  <!-- "SOLISTA" -->
  <!-- We'll write letters S O L I S T as text, and draw the custom 'A' with a green diamond in it -->
  <g id="solista-text" transform="translate(0, 220)">
    <!-- Letters "SOLIST" -->
    <text x="65" y="55" font-size="52" class="logo-text-navy" letter-spacing="12">SOLIST</text>
    
    <!-- Custom Letter "A" -->
    <!-- Triangle outline of A -->
    <polygon points="383,16 414,55 352,55" fill="#002D62" />
    <!-- Cutout inner triangle of A -->
    <polygon points="383,27 402,51 364,51" fill="#ffffff" />
    <!-- Green Diamond inside the A -->
    <polygon points="383,34 391,44 383,54 375,44" fill="#009a44" />
  </g>

  <!-- "— ENERGIES —" -->
  <g id="energies-text" transform="translate(0, 300)">
    <!-- Left Green Line -->
    <line x1="50" y1="12" x2="110" y2="12" class="logo-line" />
    <!-- Text -->
    <text x="128" y="20" font-size="23" class="logo-text-green">ENERGIES</text>
    <!-- Right Green Line -->
    <line x1="390" y1="12" x2="450" y2="12" class="logo-line" />
  </g>

  <!-- "PRIVATE LIMITED" -->
  <text x="125" y="358" font-size="14.5" class="logo-text-navy-sm">PRIVATE LIMITED</text>

  <!-- Tagline: "TURNING TODAY'S RESOURCES INTO TOMORROW'S ENERGY" -->
  <text x="50" y="392" class="logo-tagline">TURNING TODAY'S RESOURCES INTO TOMORROW'S ENERGY</text>

</svg>
